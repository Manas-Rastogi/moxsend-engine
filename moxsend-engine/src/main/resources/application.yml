server:
  port: ${PORT:8085}

spring:
  data:
    mongodb:
      uri: ${MONGODB_URI}
      database: Moxsend-Engine

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

groq:
  api:
    groq:
    api-key: ${GROQ_API_KEY}
    url: https://api.groq.com/openai/v1/chat/completions

async:
  core-pool-size: 3
  max-pool-size: 10
  queue-capacity: 100

logging:
  level:
    dolpi.moxsend_engine: DEBUG
